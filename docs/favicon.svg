<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd"/>
      <stop offset="100%" style="stop-color:#0a58ca"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Tree structure: vertical trunk line -->
  <line x1="16" y1="12" x2="16" y2="52" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Root node -->
  <circle cx="16" cy="12" r="4" fill="white"/>
  <!-- Branch 1 horizontal line -->
  <line x1="16" y1="24" x2="30" y2="24" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="30" cy="24" r="3.5" fill="white" opacity="0.9"/>
  <!-- Branch 2 horizontal line (selected - filled) -->
  <line x1="16" y1="36" x2="30" y2="36" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="30" cy="36" r="3.5" fill="white"/>
  <!-- Checkmark in selected node -->
  <polyline points="27,36 29.5,38.5 33.5,33.5" stroke="#0d6efd" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Branch 3 horizontal line -->
  <line x1="16" y1="48" x2="30" y2="48" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="30" cy="48" r="3.5" fill="white" opacity="0.6"/>
  <!-- Sub-branch from branch 2 -->
  <line x1="30" y1="36" x2="30" y2="44" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="30" y1="44" x2="44" y2="44" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="44" cy="44" r="3" fill="white" opacity="0.7"/>
</svg>
